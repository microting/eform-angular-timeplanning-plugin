<h2 mat-dialog-title>{{ dialogTitle | translate }}</h2>

<mat-dialog-content>
  <app-break-policy-rule-form [ruleForm]="ruleForm"></app-break-policy-rule-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button
          (click)="onCancel()"
          id="cancelBtn">
    {{ 'Cancel' | translate }}
  </button>
  <button mat-raised-button
          color="primary"
          (click)="onSave()"
          [disabled]="!ruleForm.valid"
          id="saveBtn">
    {{ submitButtonText | translate }}
  </button>
</mat-dialog-actions>
