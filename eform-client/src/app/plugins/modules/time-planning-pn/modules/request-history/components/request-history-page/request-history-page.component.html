<mat-card class="eform-sub-header d-flex flex-column gap-12 mb-3 p-3" style="align-items: stretch;">
  <h2 style="margin: 0">{{ 'Request History' | translate }}</h2>
  <div class="d-flex flex-row flex-wrap align-items-end justify-content-end gap-12" id="time-planning-pn-request-history-filters">
    <mat-form-field style="width: 200px;">
      <mat-label>{{ 'Type' | translate }}</mat-label>
      <mtx-select
        [items]="typeOptions"
        bindLabel="value"
        bindValue="id"
        [clearable]="false"
        [(ngModel)]="filterType"
        id="requestHistoryTypeFilter">
      </mtx-select>
    </mat-form-field>

    <mat-form-field style="width: 200px;">
      <mat-label>{{ 'Status' | translate }}</mat-label>
      <mtx-select
        [items]="statusOptions"
        bindLabel="value"
        bindValue="id"
        [clearable]="false"
        [(ngModel)]="filterStatus"
        id="requestHistoryStatusFilter">
      </mtx-select>
    </mat-form-field>

    <mat-form-field style="width: 170px;">
      <mat-label>{{ 'Date From' | translate }}</mat-label>
      <input matInput type="date" [(ngModel)]="filterFromDate" id="requestHistoryFromDate" />
    </mat-form-field>

    <mat-form-field style="width: 170px;">
      <mat-label>{{ 'Date To' | translate }}</mat-label>
      <input matInput type="date" [(ngModel)]="filterToDate" id="requestHistoryToDate" />
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="applyFilters()" id="applyFiltersBtn">
      {{ 'Apply' | translate }}
    </button>
  </div>
</mat-card>

<mtx-grid
  [data]="filteredRows"
  [cellTemplate]="{ type: typeTpl, status: statusTpl }"
  [showPaginator]="true"
  [pageOnFront]="true"
  [pageSize]="25"
  [pageSizeOptions]="[10, 25, 50, 100]"
  [rowStriped]="false"
  [showToolbar]="false"
  [showColumnMenuButton]="false"
  [loading]="isLoading"
  id="time-planning-pn-request-history-grid"
  [columns]="tableHeaders"
  noResultText="{{ 'No requests found' | translate }}"
></mtx-grid>

<ng-template #typeTpl let-row>
  <span class="type-badge" [ngClass]="{
    'type-handover': row.type === 'Handover',
    'type-absence': row.type === 'Absence'
  }">
    {{ row.type | translate }}
  </span>
</ng-template>

<ng-template #statusTpl let-row>
  <mat-chip [ngClass]="{
    'tag-success': row.status === 'Approved' || row.status === 'Accepted',
    'tag-warning': row.status === 'Pending',
    'tag-error': row.status === 'Rejected'
  }">
    <span title="{{ row.status | translate }}">{{ row.status | translate }}</span>
  </mat-chip>
</ng-template>
