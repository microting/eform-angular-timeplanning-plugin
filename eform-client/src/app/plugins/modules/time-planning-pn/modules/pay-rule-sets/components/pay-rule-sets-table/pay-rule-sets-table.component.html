<div class="table-actions">
  <button
    id="openCreatePayRuleSetBtn"
    class="btn-primary btn-primary--icon-left"
    (click)="openCreateModal()">
    {{ 'Create Pay Rule Set' | translate }}
  </button>
</div>

<mtx-grid
  [data]="payRuleSets"
  [loading]="loading"
  [cellTemplate]="{actions: actionsTpl}"
  [showPaginator]="false"
  [pageOnFront]="false"
  [rowStriped]="false"
  [showToolbar]="false"
  [showColumnMenuButton]="false"
  id="time-planning-pn-pay-rule-sets-grid"
  [columns]="tableHeaders"
  noResultText="{{'No pay rule sets found' | translate}}"
></mtx-grid>

<ng-template #actionsTpl let-row let-i="index">
  <div id="action-items{{i}}">
    <button id="actionMenu" mat-icon-button [matMenuTriggerFor]="menu" matTooltip="{{ 'Actions' | translate }}">
      <mat-icon>more_vert</mat-icon>
    </button>

    <mat-menu #menu="matMenu">
      <button
        mat-menu-item
        id="editPayRuleSetBtn-{{i}}"
        (click)="openEditModal(row)"
      >
        <mat-icon>edit</mat-icon>
        <span>{{ 'Edit pay rule set' | translate }}</span>
      </button>
      <button
        mat-menu-item
        id="deletePayRuleSetBtn-{{i}}"
        class="btn-delete-menu"
        (click)="openDeleteModal(row)"
      >
        <mat-icon>delete</mat-icon>
        <span>{{ 'Delete pay rule set' | translate }}</span>
      </button>
    </mat-menu>
  </div>
</ng-template>
