<h2 mat-dialog-title>{{ 'Edit Pay Rule Set' | translate }}</h2>

<div mat-dialog-content *ngIf="!loading">
  <form [formGroup]="form">
    <mat-form-field class="full-width">
      <mat-label>{{ 'Name' | translate }}</mat-label>
      <input matInput formControlName="name" id="payRuleSetName" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">
        {{ 'Name is required' | translate }}
      </mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('minlength')">
        {{ 'Name must be at least 2 characters' | translate }}
      </mat-error>
    </mat-form-field>

    <app-pay-day-rule-list
      [payDayRulesFormArray]="payDayRulesFormArray"
      (addRule)="onAddPayDayRule()"
      (editRule)="onEditPayDayRule($event)"
      (deleteRule)="onDeletePayDayRule($event)">
    </app-pay-day-rule-list>

    <app-day-type-rule-list
      [dayTypeRulesFormArray]="payDayTypeRulesFormArray"
      (addRule)="onAddDayTypeRule()"
      (editRule)="onEditDayTypeRule($event)"
      (deleteRule)="onDeleteDayTypeRule($event)">
    </app-day-type-rule-list>
  </form>
</div>

<div mat-dialog-content *ngIf="loading">
  <p>{{ 'Loading...' | translate }}</p>
</div>

<div mat-dialog-actions align="end">
  <button
    class="btn-cancel"
    mat-dialog-close
    (click)="cancel()" id="cancelEditBtn">
    {{ 'Cancel' | translate }}
  </button>
  <button
    class="btn-primary btn-primary--icon-left"
    (click)="updatePayRuleSet()"
    [disabled]="form.invalid || loading" id="updatePayRuleSetBtn">
    {{ 'Update' | translate }}
  </button>
</div>
