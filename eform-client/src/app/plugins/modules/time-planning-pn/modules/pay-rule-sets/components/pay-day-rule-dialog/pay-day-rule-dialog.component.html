<h2 mat-dialog-title>{{ dialogTitle }}</h2>

<mat-dialog-content>
  <app-pay-day-rule-form [payDayRuleForm]="payDayRuleForm"></app-pay-day-rule-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-button
    id="cancelPayDayRuleBtn"
    (click)="cancel()">
    Cancel
  </button>
  <button
    mat-raised-button
    color="primary"
    id="savePayDayRuleBtn"
    [disabled]="!payDayRuleForm.valid"
    (click)="save()">
    Save
  </button>
</mat-dialog-actions>
