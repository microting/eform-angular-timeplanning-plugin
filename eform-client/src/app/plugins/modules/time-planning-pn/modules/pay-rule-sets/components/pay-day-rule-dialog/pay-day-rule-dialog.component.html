<h2 mat-dialog-title>{{ dialogTitle }}</h2>

<mat-dialog-content>
  <app-pay-day-rule-form [payDayRuleForm]="payDayRuleForm"></app-pay-day-rule-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    class="btn-cancel"
    mat-dialog-close
    id="cancelPayDayRuleBtn"
    (click)="cancel()">
    Cancel
  </button>
  <button
    class="btn-primary btn-primary--icon-left"
    id="savePayDayRuleBtn"
    [disabled]="!payDayRuleForm.valid"
    (click)="save()">
    Save
  </button>
</mat-dialog-actions>
