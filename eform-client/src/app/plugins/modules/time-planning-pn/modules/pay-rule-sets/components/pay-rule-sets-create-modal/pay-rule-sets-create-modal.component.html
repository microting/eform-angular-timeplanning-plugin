<h2 mat-dialog-title>Create Pay Rule Set</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" id="createPayRuleSetName" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">
        Name is required
      </mat-error>
      <mat-error *ngIf="form.get('name')?.hasError('minlength')">
        Name must be at least 2 characters
      </mat-error>
    </mat-form-field>

    <div class="pay-day-rules-section">
      <app-pay-day-rule-list
        [payDayRulesFormArray]="payDayRulesFormArray"
        (addRule)="onAddPayDayRule()"
        (editRule)="onEditPayDayRule($event)"
        (deleteRule)="onDeletePayDayRule($event)">
      </app-pay-day-rule-list>
    </div>

    <div class="day-type-rules-section">
      <app-day-type-rule-list
        [dayTypeRulesFormArray]="payDayTypeRulesFormArray"
        (addRule)="onAddDayTypeRule()"
        (editRule)="onEditDayTypeRule($event)"
        (deleteRule)="onDeleteDayTypeRule($event)">
      </app-day-type-rule-list>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button
    class="btn-cancel"
    mat-dialog-close
    (click)="cancel()"
    id="cancelCreateBtn">
    {{ 'Cancel' | translate }}
  </button>
  <button
    class="btn-primary btn-primary--icon-left"
    (click)="createPayRuleSet()"
    [disabled]="form.invalid"
    id="createPayRuleSetBtn">
    <span>{{ 'Create' | translate }}</span>
  </button>
</mat-dialog-actions>
