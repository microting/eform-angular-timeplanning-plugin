syntax = "proto3";

package timeplanning;

import "common.proto";
import "google/protobuf/wrappers.proto";

option csharp_namespace = "TimePlanning.Pn.Grpc";

message CreateContentHandoverRequest {
  int32 from_plan_registration_id = 1;
  int32 to_sdk_site_id = 2;
  string request_comment = 3;
  DeviceMetadata device = 4;
  repeated int32 shift_indices = 5;
}

message ContentHandoverDecisionRequest {
  int32 request_id = 1;
  int32 current_sdk_site_id = 2;
  string decision_comment = 3;
  DeviceMetadata device = 4;
}

message CancelContentHandoverRequest {
  int32 request_id = 1;
  int32 current_sdk_site_id = 2;
  DeviceMetadata device = 3;
}

message GetContentHandoverRequestsRequest {
  int32 sdk_site_id = 1;
  DeviceMetadata device = 2;
}

message ContentHandoverRequestModel {
  int32 id = 1;
  int32 from_sdk_site_id = 2;
  int32 to_sdk_site_id = 3;
  string date = 4;
  int32 from_plan_registration_id = 5;
  int32 to_plan_registration_id = 6;
  string status = 7;
  string requested_at_utc = 8;
  // Wrapped — JSON envelope sends null until the request is decided / when
  // optional comments / shift slot are absent. proto3 default ("" / 0) would
  // collapse to a non-null value and break the contract diff.
  google.protobuf.StringValue responded_at_utc = 9;
  google.protobuf.StringValue request_comment = 10;
  google.protobuf.StringValue decision_comment = 11;
  google.protobuf.Int32Value shift_index = 12;
  google.protobuf.Int32Value shift_start_time = 13;
  google.protobuf.Int32Value shift_end_time = 14;
  // JSON envelope from GetAllAsync includes worker names; null on Create.
  google.protobuf.StringValue from_worker_name = 15;
  google.protobuf.StringValue to_worker_name = 16;
}

message ContentHandoverResponse {
  bool success = 1;
  string message = 2;
  ContentHandoverRequestModel model = 3;
  repeated ContentHandoverRequestModel models = 4;
}

message ContentHandoverListResponse {
  bool success = 1;
  string message = 2;
  repeated ContentHandoverRequestModel models = 3;
}

message GetHandoverEligibleCoworkersRequest {
  string date = 1;
  DeviceMetadata device = 2;
  repeated int32 shift_indices = 3;
}

message HandoverCoworker {
  int32 sdk_site_id = 1;
  string site_name = 2;
  int32 plan_registration_id = 3;
}

message GetHandoverEligibleCoworkersResponse {
  bool success = 1;
  string message = 2;
  repeated HandoverCoworker coworkers = 3;
}

service TimePlanningContentHandoverService {
  rpc CreateContentHandover(CreateContentHandoverRequest) returns (ContentHandoverResponse);
  rpc AcceptContentHandover(ContentHandoverDecisionRequest) returns (OperationResponse);
  rpc RejectContentHandover(ContentHandoverDecisionRequest) returns (OperationResponse);
  rpc CancelContentHandover(CancelContentHandoverRequest) returns (OperationResponse);
  rpc GetContentHandoverInbox(GetContentHandoverRequestsRequest) returns (ContentHandoverListResponse);
  rpc GetMyContentHandovers(GetContentHandoverRequestsRequest) returns (ContentHandoverListResponse);
  rpc GetHandoverEligibleCoworkers(GetHandoverEligibleCoworkersRequest) returns (GetHandoverEligibleCoworkersResponse);
}
