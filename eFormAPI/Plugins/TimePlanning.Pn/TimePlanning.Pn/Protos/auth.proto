syntax = "proto3";

package timeplanning;

import "common.proto";

option csharp_namespace = "TimePlanning.Pn.Grpc";

message ActivateDeviceRequest {
  string customer_no = 1;
  string ot_code = 2;
}

message ActivateDeviceResponse {
  bool success = 1;
  string message = 2;
  ActivateDeviceModel model = 3;
}

message ActivateDeviceModel {
  string token = 1;
}

message AuthenticateUserRequest {
  string username = 1;
  string password = 2;
  string grant_type = 3;
}

message AuthenticateUserResponse {
  bool success = 1;
  string message = 2;
  AuthUserModel model = 3;
}

message AuthUserModel {
  string access_token = 1;
  string first_name = 2;
  string last_name = 3;
}

message RefreshTokenRequest {}

message RefreshTokenResponse {
  bool success = 1;
  string message = 2;
  AuthUserModel model = 3;
}

service TimePlanningAuthService {
  rpc ActivateDevice(ActivateDeviceRequest) returns (ActivateDeviceResponse);
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}
